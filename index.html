<!DOCTYPE html>
<html>
<head>
    <title>Pack-N-Fax Tool</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 flex justify-center">
    <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-md border border-gray-200">
        <h1 class="text-2xl font-bold mb-4 text-blue-800 border-b pb-4 text-center">Shop Quote Tool</h1>
        <div id="status" class="text-center text-[10px] font-bold py-1 mb-4 rounded bg-yellow-100 text-yellow-700">Syncing...</div>

        <div class="space-y-4">
            <div class="p-3 bg-slate-50 rounded-xl border">
                <h2 class="font-bold text-blue-700 uppercase text-[10px] mb-2 text-center">Custom Products (3.5x)</h2>
                <select id="cSel" class="w-full p-2 border-2 rounded-lg text-sm"><option value="none">-- Select --</option></select>
                <input id="cLen" type="number" placeholder="Enter Feet" class="w-full p-2 border-2 rounded-lg text-sm mt-2">
            </div>

            <div class="p-3 bg-slate-50 rounded-xl border">
                <h2 class="font-bold text-emerald-700 uppercase text-[10px] mb-2 text-center">Standard Banners & Signs</h2>
                <select id="sSel" class="w-full p-2 border-2 rounded-lg text-sm"><option value="none">-- Select --</option></select>
                <input id="sQty" type="number" placeholder="Quantity" class="w-full p-2 border-2 rounded-lg text-sm mt-2">
            </div>

            <div class="p-3 bg-slate-50 rounded-xl border">
                <h2 class="font-bold text-orange-600 uppercase text-[10px] mb-2 text-center">Posters</h2>
                <select id="pSel" onchange="toggleP()" class="w-full p-2 border-2 rounded-lg text-sm"><option value="none">-- Select --</option></select>
                <div id="pStd"><input id="pQty" type="number" placeholder="Quantity" class="w-full p-2 border-2 rounded-lg text-sm mt-2"></div>
                <div id="pCust" class="hidden grid grid-cols-2 gap-2 mt-2">
                    <input id="pH" type="number" placeholder="H (In)" class="p-2 border-2 rounded-lg text-sm">
                    <input id="pW" type="number" placeholder="W (In)" class="p-2 border-2 rounded-lg text-sm">
                </div>
            </div>

            <div class="p-3 bg-blue-50 rounded-xl border grid grid-cols-2 gap-2">
                <div><span class="text-[9px] font-bold text-gray-500 uppercase">Laminate?</span>
                <select id="lam" class="w-full p-1 rounded text-xs border"><option value="no">NO</option><option value="yes">YES</option></select></div>
                <div><span class="text-[9px] font-bold text-gray-500 uppercase">Grommetts?</span>
                <select id="grom" class="w-full p-1 rounded text-xs border"><option value="0">NONE</option><option value="1">1 SET</option><option value="2">2 SETS</option></select></div>
            </div>
        </div>

        <button onclick="calculate()" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl text-xl mt-4">CALCULATE</button>
        <div id="resBox" class="hidden mt-4 p-4 bg-green-100 border-2 border-green-500 rounded-xl text-center">
            <p id="total" class="text-4xl font-black text-green-900">$0.00</p>
            <button onclick="location.reload()" class="mt-2 text-[10px] text-green-700 underline uppercase">Reset</button>
        </div>
    </div>

    <script>
        // PASTE YOUR NEW LINK HERE (It should be around line 61 now)
        const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTWBKchl9PZg5iLiG73UCxO_CFU7NOAT8SpcYQ_HeGDoQ-lAScneRG1Sn258LlvvMs7UpJTHPQXvhqq/pub?output=csv";
        
        let db = {};
        async function load() {
            try {
                const r = await fetch(URL + "&t=" + Date.now());
                const t = await r.text();
                t.split(/\r?\n/).slice(1).forEach(row => {
                    const [cat, name, price] = row.split(',');
                    if (!name || isNaN(parseFloat(price))) return;
                    db[name] = { cat: cat.trim().toLowerCase(), price: parseFloat(price) };
                    let opt = document.createElement('option'); opt.value = name; opt.textContent = name;
                    if (cat.toLowerCase().includes('custom') && name.toLowerCase() !== 'laminate') document.getElementById('cSel').appendChild(opt);
                    if (cat.toLowerCase().includes('standard') && !name.toLowerCase().includes('grommett')) document.getElementById('sSel').appendChild(opt);
                    if (cat.toLowerCase().includes('poster')) {
                        opt.textContent = name.replace(/poster|size/gi, '').trim();
                        document.getElementById('pSel').appendChild(opt);
                    }
                });
                document.getElementById('status').innerText = "✅ Items Synced";
                document.getElementById('status').className = "text-center text-[10px] font-bold py-1 mb-4 rounded bg-green-100 text-green-700";
            } catch (e) { document.getElementById('status').innerText = "❌ Sync Error"; }
        }
        function toggleP() {
            const isC = document.getElementById('pSel').value.toLowerCase().includes('custom');
            document.getElementById('pCust').classList.toggle('hidden', !isC);
            document.getElementById('pStd').classList.toggle('hidden', isC);
        }
        function calculate() {
            const cN = document.getElementById('cSel').value, cL = parseFloat(document.getElementById('cLen').value);
            const sN = document.getElementById('sSel').value, sQ = parseFloat(document.getElementById('sQty').value);
            const pN = document.getElementById('pSel').value, pQ = parseFloat(document.getElementById('pQty').value);
            const pH = parseFloat(document.getElementById('pH').value), pW = parseFloat(document.getElementById('pW').value);
            const lam = document.getElementById('lam').value, gr = document.getElementById('grom').value;
            let p = 0; const lC = db['Laminate']?.price || 0;
            if (cN !== "none" && !isNaN(cL)) { p = (cL * (db[cN].price + (lam === 'yes' ? lC : 0))) * 3.5; }
            else if (sN !== "none" && !isNaN(sQ)) { p = (sQ * db[sN].price) + (lam === 'yes' ? lC * sQ : 0); }
            else if (pN !== "none") {
                if (pN.toLowerCase().includes('custom')) { p = (pH * pW / 144) * db[pN].price; }
                else if (!isNaN(pQ)) { p = pQ * db[pN].price; }
            } else { return alert("Select an item!"); }
            if (gr !== "0") p += (db[`Grommett ${gr} set${gr === '2' ? 's' : ''}`]?.price || 0);
            document.getElementById('total').innerText = "$" + p.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('resBox').classList.remove('hidden');
        }
        load();
    </script>
</body>
</html>
