<!DOCTYPE html>
<html>
<head>
    <title>Pack-N-Fax Pricing Tool</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 flex justify-center">
    <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-md border border-gray-200">
        <h1 class="text-2xl font-bold mb-4 text-blue-800 border-b pb-4 text-center tracking-tight">Shop Quote Tool</h1>
        
        <div id="status" class="text-center text-[10px] font-bold py-1 mb-4 rounded bg-yellow-100 text-yellow-700">Connecting...</div>

        <div class="mb-3 p-3 bg-slate-50 rounded-xl border border-slate-200">
            <h2 class="font-bold text-blue-700 uppercase text-[10px] mb-2 tracking-widest text-center">Custom Products (3.5x)</h2>
            <select id="vinylSelect" class="w-full p-2 border-2 border-gray-200 rounded-lg mb-2 text-sm outline-none"><option value="none">-- Select Product --</option></select>
            <div>
                <span class="text-[9px] font-bold text-gray-400 uppercase ml-1">Running Length (Feet)</span>
                <input id="vinylLen" type="number" step="any" placeholder="0" class="w-full p-2 border-2 border-gray-200 rounded-lg text-sm outline-none">
            </div>
        </div>

        <div class="mb-3 p-3 bg-slate-50 rounded-xl border border-slate-200">
            <h2 class="font-bold text-emerald-700 uppercase text-[10px] mb-2 tracking-widest text-center">Standard Banners & Yard Signs (Direct)</h2>
            <select id="itemSelect" class="w-full p-2 border-2 border-gray-200 rounded-lg mb-2 text-sm outline-none"><option value="none">-- Select Item --</option></select>
            <div>
                <span class="text-[9px] font-bold text-gray-400 uppercase ml-1">Quantity</span>
                <input id="itemQty" type="number" step="1" placeholder="0" class="w-full p-2 border-2 border-gray-200 rounded-lg text-sm outline-none">
            </div>
        </div>

        <div class="mb-3 p-3 bg-slate-50 rounded-xl border border-slate-200">
            <h2 class="font-bold text-orange-600 uppercase text-[10px] mb-2 tracking-widest text-center">Posters</h2>
            <select id="posterSelect" onchange="togglePosterCustom()" class="w-full p-2 border-2 border-gray-200 rounded-lg mb-2 text-sm outline-none"><option value="none">-- Select Size --</option></select>
            
            <div id="posterStandardQty">
                <span class="text-[9px] font-bold text-gray-400 uppercase ml-1">Quantity</span>
                <input id="pQty" type="number" step="1" placeholder="0" class="w-full p-2 border-2 border-gray-200 rounded-lg text-sm outline-none">
            </div>

            <div id="posterCustomFields" class="hidden space-y-2">
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <span class="text-[9px] font-bold text-gray-400 uppercase ml-1">Height (In)</span>
                        <input id="pH" type="number" step="any" class="w-full p-2 border-2 border-gray-200 rounded-lg text-sm outline-none">
                    </div>
                    <div>
                        <span class="text-[9px] font-bold text-gray-400 uppercase ml-1">Width (In)</span>
                        <input id="pW" type="number" step="any" class="w-full p-2 border-2 border-gray-200 rounded-lg text-sm outline-none">
                    </div>
                </div>
                <p class="text-[9px] text-orange-600 font-bold text-center italic">Calculated at $8.50 per sq ft</p>
            </div>
        </div>

        <div class="mb-4 p-3 bg-blue-50 rounded-xl border border-blue-200">
            <h2 class="font-bold text-blue-800 uppercase text-[10px] mb-2 tracking-widest text-center">Add-ons</h2>
            <div class="grid grid-cols-2 gap-2">
                <div class="flex flex-col bg-white p-2 rounded-lg border border-blue-100">
                    <span class="text-[10px] font-bold text-gray-500 uppercase">Laminate?</span>
                    <select id="laminate" class="p-1 rounded text-xs font-bold text-blue-800 outline-none"><option value="no">NO</option><option value="yes">YES</option></select>
                </div>
                <div class="flex flex-col bg-white p-2 rounded-lg border border-blue-100">
                    <span class="text-[10px] font-bold text-gray-500 uppercase">Grommetts?</span>
                    <select id="grommetSelect" class="p-1 rounded text-xs font-bold text-blue-800 outline-none"><option value="0">NONE</option><option value="1">1 SET</option><option value="2">2 SETS</option></select>
                </div>
            </div>
        </div>

        <button onclick="calculate()" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl text-xl shadow-lg active:scale-95 transition">CALCULATE</button>

        <div id="resultBox" class="hidden mt-4 p-4 bg-green-100 border-2 border-green-500 rounded-xl text-center">
            <p id="total" class="text-4xl font-black text-green-900">$0.00</p>
            <button onclick="location.reload()" class="mt-2 text-[10px] text-green-700 underline block w-full text-center font-bold">CLEAR</button>
        </div>
    </div>

    <script>
        // *** PASTE YOUR GOOGLE LINK BELOW (Make sure it ends in output=csv) ***
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRpd0v8hfAE_Ok5bjHS-OnuCjL6dJoaoXm2qGEOV47Ph2AGbZ7deEQd5ln0xfDONyAxIX7sIkr9saB5/pub?output=csv";
        
        let pricingData = {};

        fetch(SHEET_URL)
            .then(res => {
                if(!res.ok) throw new Error("Link broken");
                return res.text();
            })
            .then(data => {
                const rows = data.split(/\r?\n/).slice(1);
                rows.forEach(row => {
                    const cols = row.split(',');
                    // Mapping columns A/B, D/E, G/H
                    if (cols[0] && cols[1]) pricingData[cols[0].trim()] = parseFloat(cols[1]);
                    if (cols[3] && cols[4]) pricingData[cols[3].trim()] = parseFloat(cols[4]);
                    if (cols[6] && cols[7]) pricingData[cols[6].trim()] = parseFloat(cols[7]);
                });
                
                // Populate Dropdowns
                for (let key in pricingData) {
                    let opt = document.createElement('option'); opt.value = key;
                    const low = key.toLowerCase();
                    if (low.includes('poster')) {
                        opt.textContent = key.replace(/poster/gi, '').replace(/size/gi, '').trim() || key;
                        document.getElementById('posterSelect').appendChild(opt);
                    } else if (low.includes('vinyl') || (low.includes('banner') && !low.includes('standard'))) {
                        if (low !== 'laminate') { opt.textContent = key; document.getElementById('vinylSelect').appendChild(opt); }
                    } else if (low.includes('standard') || low.includes('sign') || low.includes('grommett')) {
                        if (!low.includes('grommett')) { opt.textContent = key; document.getElementById('itemSelect').appendChild(opt); }
                    }
                }
                
                document.getElementById('status').innerText = "✅ Prices Synced";
                document.getElementById('status').className = "text-center text-[10px] font-bold py-1 mb-4 rounded bg-green-100 text-green-700";
            })
            .catch(err => {
                document.getElementById('status').innerText = "❌ ERROR: Check Sheet Link";
                document.getElementById('status').className = "text-center text-[10px] font-bold py-1 mb-4 rounded bg-red-100 text-red-700";
            });

        function togglePosterCustom() {
            const val = document.getElementById('posterSelect').value.toLowerCase();
            document.
