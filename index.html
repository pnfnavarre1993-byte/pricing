<!DOCTYPE html>
<html>
<head>
    <title>Pack-N-Fax Pricing Tool</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 flex justify-center font-sans">
    <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-md border border-gray-200">
        <h1 class="text-2xl font-bold mb-4 text-blue-800 border-b pb-4 text-center tracking-tight">Shop Quote Tool</h1>
        
        <div id="status" class="text-center text-[10px] font-bold py-1 mb-4 rounded bg-yellow-100 text-yellow-700 italic">Connecting to Master List...</div>

        <div class="space-y-4">
            <div class="p-4 bg-slate-50 rounded-xl border border-slate-200">
                <h2 class="font-bold text-blue-700 uppercase text-[10px] mb-2 tracking-widest text-center">Custom Products (3.5x Markup)</h2>
                <select id="customSelect" class="w-full p-2 border-2 border-gray-200 rounded-lg text-sm bg-white outline-none">
                    <option value="none">-- Select Product --</option>
                </select>
                <div class="mt-2">
                    <span class="text-[9px] font-bold text-gray-400 uppercase ml-1">Running Length (Feet)</span>
                    <input id="customLen" type="number" step="any" placeholder="0" class="w-full p-2 border-2 border-gray-200 rounded-lg text-sm outline-none">
                </div>
            </div>

            <div class="p-4 bg-slate-50 rounded-xl border border-slate-200">
                <h2 class="font-bold text-emerald-700 uppercase text-[10px] mb-2 tracking-widest text-center">Standard Banners & Signs</h2>
                <select id="standardSelect" class="w-full p-2 border-2 border-gray-200 rounded-lg text-sm bg-white outline-none">
                    <option value="none">-- Select Item --</option>
                </select>
                <div class="mt-2">
                    <span class="text-[9px] font-bold text-gray-400 uppercase ml-1">Quantity</span>
                    <input id="standardQty" type="number" step="1" placeholder="0" class="w-full p-2 border-2 border-gray-200 rounded-lg text-sm outline-none">
                </div>
            </div>

            <div class="p-4 bg-slate-50 rounded-xl border border-slate-200">
                <h2 class="font-bold text-orange-600 uppercase text-[10px] mb-2 tracking-widest text-center">Posters</h2>
                <select id="posterSelect" onchange="togglePosterFields()" class="w-full p-2 border-2 border-gray-200 rounded-lg text-sm bg-white outline-none">
                    <option value="none">-- Select Size --</option>
                </select>
                
                <div id="pStandardQtyBox" class="mt-2">
                    <span class="text-[9px] font-bold text-gray-400 uppercase ml-1">Quantity</span>
                    <input id="posterQty" type="number" step="1" placeholder="0" class="w-full p-2 border-2 border-gray-200 rounded-lg text-sm outline-none">
                </div>

                <div id="pCustomSizeBox" class="hidden space-y-2 mt-2">
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <span class="text-[9px] font-bold text-gray-400 uppercase ml-1">Height (In)</span>
                            <input id="posterH" type="number" step="any" class="w-full p-2 border-2 border-gray-200 rounded-lg text-sm outline-none">
                        </div>
                        <div>
                            <span class="text-[9px] font-bold text-gray-400 uppercase ml-1">Width (In)</span>
                            <input id="posterW" type="number" step="any" class="w-full p-2 border-2 border-gray-200 rounded-lg text-sm outline-none">
                        </div>
                    </div>
                    <p class="text-[9px] text-orange-600 font-bold text-center italic">Calculated per sq ft</p>
                </div>
            </div>

            <div class="p-4 bg-blue-50 rounded-xl border border-blue-200 grid grid-cols-2 gap-3">
                <div class="flex flex-col">
                    <span class="text-[10px] font-bold text-gray-500 uppercase mb-1">Add Laminate?</span>
                    <select id="laminate" class="p-2 rounded-lg text-sm font-bold text-blue-800 border-2 border-blue-100 bg-white outline-none">
