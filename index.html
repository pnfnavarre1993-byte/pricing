<!DOCTYPE html>
<html>
<head>
    <title>Pack-N-Fax Pricing Tool</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 flex justify-center">
    <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-md border border-gray-200">
        <h1 class="text-2xl font-bold mb-4 text-blue-800 border-b pb-4 text-center tracking-tight">Shop Quote Tool</h1>
        
        <div class="mb-3 p-3 bg-slate-50 rounded-xl border border-slate-200">
            <h2 class="font-bold text-blue-700 uppercase text-[10px] mb-2 tracking-widest text-center">Custom Vinyl (Markup Applied)</h2>
            <select id="vinylSelect" class="w-full p-2 border-2 border-gray-200 rounded-lg mb-2 bg-white text-sm outline-none">
                <option value="none">Loading...</option>
            </select>
            <input id="vinylLen" type="number" step="any" placeholder="Length (Feet)" class="w-full p-2 border-2 border-gray-200 rounded-lg mb-2 text-sm">
            <div class="flex items-center justify-between bg-white p-2 rounded-lg border border-gray-200">
                <span class="text-xs font-bold text-gray-700">Add Laminate?</span>
                <select id="laminate" class="p-1 rounded border text-xs font-bold text-blue-800">
                    <option value="no">NO</option>
                    <option value="yes">YES</option>
                </select>
            </div>
        </div>

        <div class="mb-3 p-3 bg-slate-50 rounded-xl border border-slate-200">
            <h2 class="font-bold text-emerald-700 uppercase text-[10px] mb-2 tracking-widest text-center">Yard Signs (Direct Price)</h2>
            <select id="yardSelect" class="w-full p-2 border-2 border-gray-200 rounded-lg mb-2 bg-white text-sm">
                <option value="none">Loading...</option>
            </select>
            <input id="yardQty" type="number" step="1" placeholder="Quantity" class="w-full p-2 border-2 border-gray-200 rounded-lg text-sm">
        </div>

        <div class="mb-3 p-3 bg-slate-50 rounded-xl border border-slate-200">
            <h2 class="font-bold text-emerald-700 uppercase text-[10px] mb-2 tracking-widest text-center">Posters (Direct Price)</h2>
            <select id="posterSelect" class="w-full p-2 border-2 border-gray-200 rounded-lg mb-2 bg-white text-sm">
                <option value="none">Loading...</option>
            </select>
            <input id="posterQty" type="number" step="1" placeholder="Quantity" class="w-full p-2 border-2 border-gray-200 rounded-lg text-sm">
        </div>

        <div class="mb-4 p-3 bg-slate-50 rounded-xl border border-slate-200">
            <h2 class="font-bold text-emerald-700 uppercase text-[10px] mb-2 tracking-widest text-center">Standard Banners (Direct Price)</h2>
            <select id="standardSelect" class="w-full p-2 border-2 border-gray-200 rounded-lg mb-2 bg-white text-sm">
                <option value="none">Loading...</option>
            </select>
            <input id="standardQty" type="number" step="1" placeholder="Quantity" class="w-full p-2 border-2 border-gray-200 rounded-lg text-sm">
        </div>

        <button onclick="calculate()" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl text-xl shadow-lg hover:bg-blue-700 active:scale-95 transition">
            CALCULATE
        </button>

        <div id="resultBox" class="hidden mt-4 p-4 bg-green-100
