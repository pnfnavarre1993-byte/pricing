<!DOCTYPE html>
<html>
<head>
    <title>Pack-N-Fax Pricing Tool</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 flex justify-center">
    <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-md border border-gray-200">
        <h1 class="text-2xl font-bold mb-4 text-blue-800 border-b pb-4 text-center">Shop Quote Tool</h1>
        
        <div id="status" class="text-center text-[10px] font-bold py-1 mb-4 rounded bg-yellow-100 text-yellow-700">Connecting to New Sheet...</div>

        <div class="space-y-4">
            <div class="p-3 bg-slate-50 rounded-xl border border-slate-200">
                <h2 class="font-bold text-blue-700 uppercase text-[10px] mb-2 tracking-widest text-center">Custom Products (3.5x)</h2>
                <select id="customSelect" class="w-full p-2 border-2 border-gray-200 rounded-lg text-sm outline-none">
                    <option value="none">-- Select Product --</option>
                </select>
                <input id="customLen" type="number" step="any" placeholder="Enter Length (Feet)" class="w-full p-2 border-2 border-gray-200 rounded-lg text-sm mt-2 outline-none">
            </div>

            <div class="p-3 bg-slate-50 rounded-xl border border-slate-200">
                <h2 class="font-bold text-emerald-700 uppercase text-[10px] mb-2 tracking-widest text-center">Standard Banners & Signs</h2>
                <select id="standardSelect" class="w-full p-2 border-2 border-gray-200 rounded-lg text-sm outline-none">
                    <option value="none">-- Select Item --</option>
                </select>
                <input id="standardQty" type="number" step="1" placeholder="Quantity" class="w-full p-2 border-2 border-gray-200 rounded-lg text-sm mt-2 outline-none">
            </div>

            <div class="p-3 bg-slate-50 rounded-xl border border-slate-200">
                <h2 class="font-bold text-orange-600 uppercase text-[10px] mb-2 tracking-widest text-center">Posters</h2>
                <select id="posterSelect" onchange="togglePoster()" class="w-full p-2 border-2 border-gray-200 rounded-lg text-sm outline-none">
                    <option value="none">-- Select Size --</option>
                </select>
                <div id="pStdBox" class="mt-2">
                    <input id="pQty" type="number" step="1" placeholder="Quantity" class="w-full p-2 border-2 border-gray-200 rounded-lg text-sm outline-none">
                </div>
                <div id="pCustBox" class="hidden grid grid-cols-2 gap-2 mt-2">
                    <input id="pH" type="number" step="any" placeholder="H (In)" class="p-2 border-2 border-gray-200 rounded-lg text-sm outline-none">
                    <input id="pW" type="number" step="any" placeholder="W (In)" class="p-2 border-2 border-gray-200 rounded-lg text-sm outline-none">
                </div>
            </div>

            <div class="p-3 bg-blue-50 rounded-xl border border-blue-200 grid grid-cols-2 gap-2">
                <div>
                    <span class="text-[9px] font-bold text-gray-500 uppercase ml-1">Laminate?</span>
                    <select id="lam" class="w-full p-1 rounded text-xs font-bold text-blue-800 border-blue-100 outline-none">
                        <option value="no">NO</option>
                        <option value="yes">YES</option>
                    </select>
                </div>
                <div>
                    <span class="text-[9px] font-bold text-gray-500 uppercase ml-1">Grommetts?</span>
                    <select id="grom" class="w-full p-1 rounded text-xs font-bold text-blue-800 border-blue-100 outline-none">
                        <option value="0">NONE</option>
                        <option value="1">1 SET</option>
                        <option value="2">2 SETS</option>
                    </select>
                </div>
            </div>
        </div>

        <button onclick="calculate()" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl text-xl shadow-lg mt-4 active:scale-95 transition">CALCULATE</button>

        <div id="resultBox" class="hidden mt-4 p-4 bg-green-100 border-2 border-green-500 rounded-xl text-center">
            <p id="total" class="text-4xl font-black text-green-900">$0.00</p>
            <button onclick="location.reload()" class="mt-2 text-[10px] text-green-700 underline font-bold uppercase tracking-widest">Clear & Reset</button>
        </div>
    </div>

    <script>
        // REPLACE THE LINK BELOW WITH YOUR NEW GOOGLE CSV LINK
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRpd0v8hfAE_Ok5bjHS-OnuCjL6dJoaoXm2qGEOV47Ph2AGbZ7deEQd5ln0xfDONyAxIX7sIkr9saB5/pub?output=csv";
        
        let masterData = {};

        async function init() {
            try {
                const response = await fetch(SHEET_URL + "&t=" + Date.now());
                const text = await response.text();
                const rows = text.split(/\r?\n/).slice(1); // Skip header

                if (rows.length === 0 || rows[0].trim() === "") {
                    throw new Error("Sheet appears empty");
                }

                rows.forEach(row => {
                    const cols = row.split(',');
                    if (cols.length < 3) return;

                    const category = cols[0].trim().toLowerCase();
                    const productName = cols[1].trim();
                    const price = parseFloat(cols[2]);

                    if (!productName || isNaN(price)) return;

                    // Save to master data
                    masterData[productName] = { category, price };

                    // Add to correct dropdown
                    let opt = document.createElement('option');
                    opt.value = productName;
                    opt.textContent = productName;

                    if (category.includes('custom') && productName.toLowerCase() !== 'laminate') {
                        document.getElementById('customSelect').appendChild(opt);
                    } else if (category.includes('standard') && !productName.toLowerCase().includes('grommett')) {
                        document.getElementById('standardSelect').appendChild(opt);
                    } else if (category.includes('poster')) {
                        opt.textContent = productName.replace(/poster|size/gi, '').trim() || productName;
                        document.getElementById('posterSelect').appendChild(opt);
                    }
                });

                const count = Object.keys(masterData).length;
                document.getElementById('status').innerText = `✅ ${count} Items Synced Successfully`;
                document.getElementById('status').className = "text-center text-[10px] font-bold py-1 mb-4 rounded bg-green-100 text-green-700";

            } catch (err) {
                document.getElementById('status').innerText = "❌ ERROR: Check Sheet Link or Content";
                document.getElementById('status').className = "text-center text-[10px] font-bold py-1 mb-4 rounded bg-red-100 text-red-700";
                console.error(err);
            }
        }

        function togglePoster() {
            const val = document.getElementById('posterSelect').value.toLowerCase();
            const isCustom = val.includes('custom');
            document.getElementById('pCustBox').classList.toggle('hidden', !isCustom);
            document.getElementById('pStdBox').classList.toggle('hidden', isCustom);
        }

        function calculate() {
            const cItem = document.getElementById('customSelect').value;
            const cLen = parseFloat(document.getElementById('customLen').value);
            const sItem = document.getElementById('standardSelect').value;
            const sQty = parseFloat(document.getElementById('standardQty').value);
            const pItem = document.getElementById('posterSelect').value;
            const pQty = parseFloat(document.getElementById('pQty').value);
            const pH = parseFloat(document.getElementById('pH').value);
            const pW = parseFloat(document.getElementById('pW').value);
            const useLam = document.getElementById('lam').value;
            const gCount = document.getElementById('grom').value;

            let finalPrice = 0;
            const lamBasePrice = masterData['Laminate']?.price || 0;

            if (cItem !== "none" && !isNaN(cLen)) {
                // Custom: (Base + optional Laminate) * Length * 3.5
                const base = masterData[cItem].price;
                const lam = (useLam === 'yes') ? lamBasePrice : 0;
                finalPrice = (cLen * (base + lam)) * 3.5;
            } 
            else if (sItem !== "none" && !isNaN(sQty)) {
                // Standard: Price * Qty + optional Laminate (flat add)
                finalPrice = sQty * masterData[sItem].price;
                if (useLam === 'yes') finalPrice += (lamBasePrice * sQty);
            } 
            else if (pItem !== "none") {
                // Posters
                if (pItem.toLowerCase().includes('custom')) {
                    if (isNaN(pH) || isNaN(pW)) return alert("Please enter Height and Width for Custom Poster");
                    finalPrice = (pH * pW / 144) * masterData[pItem].price;
                } else if (!isNaN(pQty)) {
                    finalPrice = pQty * masterData[pItem].price;
                }
            } else {
                return alert("Please select an item and enter a quantity or length!");
            }

            // Add Grommetts at the very end
            if (gCount !== "0") {
                const gKey = `Grommett ${gCount} set${gCount === '2' ? 's' : ''}`;
                finalPrice += (masterData[gKey]?.price || 0);
            }

            document.getElementById('total').innerText = "$" + finalPrice.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('resultBox').classList.remove('hidden');
        }

        init();
    </script>
</body>
</html>
