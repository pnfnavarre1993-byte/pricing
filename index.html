<!DOCTYPE html>
<html>
<head>
    <title>Pack-N-Fax Pricing Tool</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 flex justify-center">
    <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-md border border-gray-200">
        <h1 class="text-2xl font-bold mb-4 text-blue-800 border-b pb-4 text-center tracking-tight">Shop Quote Tool</h1>
        
        <div id="status" class="text-center text-[10px] font-bold py-1 mb-4 rounded bg-yellow-100 text-yellow-700">Connecting...</div>

        <div class="mb-3 p-3 bg-slate-50 rounded-xl border border-slate-200">
            <h2 class="font-bold text-blue-700 uppercase text-[10px] mb-2 tracking-widest text-center">Custom Vinyl (3.5x)</h2>
            <select id="vinylSelect" class="w-full p-2 border-2 border-gray-200 rounded-lg mb-2 text-sm"><option value="none">-- Select Vinyl --</option></select>
            <input id="vinylLen" type="number" step="any" placeholder="Length (Feet)" class="w-full p-2 border-2 border-gray-200 rounded-lg text-sm">
        </div>

        <div class="mb-3 p-3 bg-slate-50 rounded-xl border border-slate-200">
            <h2 class="font-bold text-emerald-700 uppercase text-[10px] mb-2 tracking-widest text-center">Standard Items (Direct)</h2>
            <select id="itemSelect" class="w-full p-2 border-2 border-gray-200 rounded-lg mb-2 text-sm"><option value="none">-- Select Item --</option></select>
            <input id="itemQty" type="number" step="1" placeholder="Quantity" class="w-full p-2 border-2 border-gray-200 rounded-lg text-sm">
        </div>

        <div class="mb-3 p-3 bg-slate-50 rounded-xl border border-slate-200">
            <h2 class="font-bold text-purple-700 uppercase text-[10px] mb-2 tracking-widest text-center">Acrylic Signs</h2>
            <select id="acrylicSelect" onchange="toggleAcrylicCustom()" class="w-full p-2 border-2 border-gray-200 rounded-lg mb-2 text-sm"><option value="none">-- Select Acrylic --</option></select>
            
            <div id="acrylicStandardQty">
                <input id="aQty" type="number" step="1" placeholder="Quantity" class="w-full p-2 border-2 border-gray-200 rounded-lg text-sm">
            </div>

            <div id="acrylicCustomFields" class="hidden space-y-2">
                <div class="grid grid-cols-2 gap-2">
                    <input id="aHeight" type="number" step="any" placeholder="H (Inches)" class="p-2 border-2 border-gray-200 rounded-lg text-sm">
                    <input id="aWidth" type="number" step="any" placeholder="W (Inches)" class="p-2 border-2 border-gray-200 rounded-lg text-sm">
                </div>
                <p class="text-[9px] text-purple-600 font-bold text-center italic">Calculated at $8.50/sq ft</p>
            </div>
        </div>

        <div class="mb-4 p-3 bg-blue-50 rounded-xl border border-blue-200">
            <h2 class="font-bold text-blue-800 uppercase text-[10px] mb-2 tracking-widest text-center">Add-ons</h2>
            <div class="grid grid-cols-2 gap-2">
                <div class="flex flex-col bg-white p-2 rounded-lg border border-blue-100">
                    <span class="text-[10px] font-bold text-gray-500 uppercase">Laminate?</span>
                    <select id="laminate" class="p-1 rounded text-xs font-bold text-blue-800 outline-none"><option value="no">NO</option><option value="yes">YES</option></select>
                </div>
                <div class="flex flex-col bg-white p-2 rounded-lg border border-blue-100">
                    <span class="text-[10px] font-bold text-gray-500 uppercase">Grommetts?</span>
                    <select id="grommetSelect" class="p-1 rounded text-xs font-bold text-blue-800 outline-none"><option value="0">NONE</option><option value="1">1 SET</option><option value="2">2 SETS</option></select>
                </div>
            </div>
        </div>

        <button onclick="calculate()" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl text-xl shadow-lg active:scale-95 transition">CALCULATE</button>

        <div id="resultBox" class="hidden mt-4 p-4 bg-green-100 border-2 border-green-500 rounded-xl text-center">
            <p id="total" class="text-4xl font-black text-green-900">$0.00</p>
            <button onclick="location.reload()" class="mt-2 text-[10px] text-green-700 underline block w-full text-center font-bold">CLEAR</button>
        </div>
    </div>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRpd0v8hfAE_Ok5bjHS-OnuCjL6dJoaoXm2qGEOV47Ph2AGbZ7deEQd5ln0xfDONyAxIX7sIkr9saB5/pub?output=csv";
        let pricingData = {};

        fetch(SHEET_URL).then(res => res.text()).then(data => {
            const rows = data.split(/\r?\n/).slice(1);
            rows.forEach(row => {
                const cols = row.split(',');
                // Vinyl (A/B)
                if (cols[0] && cols[1]) pricingData[cols[0].trim()] = parseFloat(cols[1]);
                // Items (D/E)
                if (cols[3] && cols[4]) pricingData[cols[3].trim()] = parseFloat(cols[4]);
                // Acrylics (G/H)
                if (cols[6] && cols[7]) pricingData[cols[6].trim()] = parseFloat(cols[7]);
            });
            updateDropdowns();
            document.getElementById('status').innerText = "✅ Synced";
            document.getElementById('status').className = "text-center text-[10px] font-bold py-1 mb-4 rounded bg-green-100 text-green-700";
        });

        function updateDropdowns() {
            for (let key in pricingData) {
                let opt = document.createElement('option'); opt.value = key; opt.textContent = key;
                if (key.toLowerCase().includes('acrylic')) document.getElementById('acrylicSelect').appendChild(opt);
                else if (key.toLowerCase().includes('vinyl') || key.toLowerCase().includes('banner')) {
                    if (key.toLowerCase() !== 'laminate' && !key.toLowerCase().includes('standard')) document.getElementById('vinylSelect').appendChild(opt);
                    else if (key.toLowerCase().includes('standard')) document.getElementById('itemSelect').appendChild(opt);
                }
                else if (key.toLowerCase().includes('sign') || key.toLowerCase().includes('grommett')) {
                    if (!key.toLowerCase().includes('grommett')) document.getElementById('itemSelect').appendChild(opt);
                }
            }
        }

        function toggleAcrylicCustom() {
            const isCustom = document.getElementById('acrylicSelect').value.toLowerCase().includes('custom');
            document.getElementById('acrylicCustomFields').classList.toggle('hidden', !isCustom);
            document.getElementById('acrylicStandardQty').classList.toggle('hidden', isCustom);
        }

        function calculate() {
            const vType = document.getElementById('vinylSelect').value, vLen = parseFloat(document.getElementById('vinylLen').value);
            const iType = document.getElementById('itemSelect').value, iQty = parseFloat(document.getElementById('itemQty').value);
            const aType = document.getElementById('acrylicSelect').value, aQty = parseFloat(document.getElementById('aQty').value);
            const aH = parseFloat(document.getElementById('aHeight').value), aW = parseFloat(document.getElementById('aWidth').value);
            const addLam = document.getElementById('laminate').value, gQty = parseInt(document.getElementById('grommetSelect').value);
            
            let price = 0;

            if (vType !== "none" && !isNaN(vLen)) {
                price = (vLen * (pricingData[vType] + (addLam === 'yes' ? pricingData['Laminate'] : 0))) * 3.5;
            } else if (iType !== "none" && !isNaN(iQty)) {
                price = iQty * pricingData[iType];
                if (addLam === 'yes') price += (pricingData['Laminate'] || 0) * iQty;
            } else if (aType !== "none") {
                if (aType.toLowerCase().includes('custom')) {
                    if (isNaN(aH) || isNaN(aW)) return alert("Enter H and W for Custom Acrylic!");
                    price = (aH * aW / 144) * 8.50; // SQ FT Calculation
                } else if (!isNaN(aQty)) {
                    price = aQty * pricingData[aType];
                }
            } else { return alert("Select an item!"); }

            if (gQty > 0) price += pricingData[`Grommett ${gQty} set${gQty > 1 ? 's' : ''}`] || 0;

            document.getElementById('total').innerText = "$" + price.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('resultBox').classList.remove('hidden');
        }
    </script>
</body>
</html>
