<script>
const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTWBKchl9PZg5iLiG73UCxO_CFU7NOAT8SpcYQ_HeGDoQ-lAScneRG1Sn258LlvvMs7UpJTHPQXvhqq/pub?output=csv";

let db = {};

async function load() {
    const status = document.getElementById('status');
    try {
        const r = await fetch(URL + "&t=" + Date.now());
        const text = await r.text();
        const rows = text.split(/\r?\n/);

        clearSelect('cSel');
        clearSelect('sSel');
        clearSelect('pSel');

        let mode = "custom"; // which table we are in

        rows.forEach((row) => {
            if (!row.trim()) return;

            const cols = row.split(',').map(c => c.trim());

            // Detect table headers
            if (/^product name/i.test(cols[0])) { mode = "custom"; return; }
            if (/^product$/i.test(cols[0])) { mode = "standard"; return; }
            if (/^poster size/i.test(cols[0])) { mode = "poster"; return; }

            // CUSTOM TABLE (3 columns)
            if (mode === "custom") {
                if (cols.length < 2) return;
                const name = cols[0];
                const price = parseFloat(cols[1].replace(/[^0-9.\-]/g, ''));
                if (isNaN(price)) return;

                db[name] = { cat: "custom", price };

                // Add to dropdown
                if (!name.toLowerCase().includes("grommet")) {
                    document.getElementById('cSel').append(new Option(name, name));
                }
                return;
            }

            // STANDARD TABLE (2 columns)
            if (mode === "standard") {
                if (cols.length < 2) return;
                const name = cols[0];
                const price = parseFloat(cols[1].replace(/[^0-9.\-]/g, ''));
                if (isNaN(price)) return;

                db[name] = { cat: "standard", price };

                if (!name.toLowerCase().includes("grommet")) {
                    document.getElementById('sSel').append(new Option(name, name));
                }
                return;
            }

            // POSTER TABLE (2 columns)
            if (mode === "poster") {
                if (cols.length < 2) return;
                const name = cols[0].replace(/"/g, '');
                const price = parseFloat(cols[1].replace(/[^0-9.\-]/g, ''));
                if (isNaN(price)) return;

                db[name] = { cat: "poster", price };

                const clean = name.replace(/poster/gi, '').trim();
                document.getElementById('pSel').append(new Option(clean, name));
                return;
            }
        });

        status.innerText = "✅ Items Synced";
        status.className = "text-center text-[10px] font-bold py-1 mb-4 rounded bg-green-100 text-green-700";

    } catch (err) {
        console.error(err);
        status.innerText = "❌ Sync Error";
        status.className = "text-center text-[10px] font-bold py-1 mb-4 rounded bg-red-100 text-red-700";
    }
}

function clearSelect(id) {
    const sel = document.getElementById(id);
    while (sel.options.length > 1) sel.remove(1);
}

function toggleP() {
    const val = document.getElementById('pSel').value || '';
    const isCustom = val.toLowerCase().includes('custom');
    document.getElementById('pCust').classList.toggle('hidden', !isCustom);
    document.getElementById('pStd').classList.toggle('hidden', isCustom);
}

function calculate() {
    const cN = cSel.value, cL = parseFloat(cLen.value);
    const sN = sSel.value, sQ = parseFloat(sQty.value);
    const pN = pSel.value, pQ = parseFloat(pQty.value);
    const pH = parseFloat(pH.value), pW = parseFloat(pW.value);
    const lam = lam.value, gr = grom.value;

    let total = 0;
    const lamPrice = db["Laminate"]?.price || 0;

    if (cN !== "none" && !isNaN(cL)) {
        total = cL * db[cN].price * 3.5;
        if (lam === "yes") total += lamPrice * cL;
    }
    else if (sN !== "none" && !isNaN(sQ)) {
        total = sQ * db[sN].price;
        if (lam === "yes") total += lamPrice * sQ;
    }
    else if (pN !== "none") {
        if (pN.toLowerCase().includes("custom")) {
            const sqft = (pH * pW) / 144;
            total = sqft * db[pN].price;
        } else {
            total = pQ * db[pN].price;
        }
    }

    if (gr !== "0") {
        const gName = `Grommet ${gr} set`;
        if (db[gName]) total += db[gName].price;
    }

    totalEl.innerText = "$" + total.toFixed(2);
    resBox.classList.remove("hidden");
}

load();
</script>
