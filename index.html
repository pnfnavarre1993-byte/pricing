<!DOCTYPE html>
<html>
<head>
    <title>Pack-N-Fax Pricing Tool</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 flex justify-center">
    <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-md border border-gray-200">
        <h1 class="text-2xl font-bold mb-4 text-blue-800 border-b pb-4 text-center tracking-tight">Shop Quote Tool</h1>
        <div id="status" class="text-center text-[10px] font-bold py-1 mb-4 rounded bg-yellow-100 text-yellow-700 italic">Syncing Master List...</div>

        <div class="mb-3 p-3 bg-slate-50 rounded-xl border border-slate-200">
            <h2 class="font-bold text-blue-700 uppercase text-[10px] mb-2 tracking-widest text-center">Custom Products (3.5x)</h2>
            <select id="customSelect" class="w-full p-2 border-2 border-gray-200 rounded-lg mb-2 text-sm outline-none"><option value="none">-- Select Product --</option></select>
            <input id="customLen" type="number" step="any" placeholder="Enter Feet" class="w-full p-2 border-2 border-gray-200 rounded-lg text-sm outline-none">
        </div>

        <div class="mb-3 p-3 bg-slate-50 rounded-xl border border-slate-200">
            <h2 class="font-bold text-emerald-700 uppercase text-[10px] mb-2 tracking-widest text-center">Standard Banners & Signs</h2>
            <select id="standardSelect" class="w-full p-2 border-2 border-gray-200 rounded-lg mb-2 text-sm outline-none"><option value="none">-- Select Item --</option></select>
            <input id="standardQty" type="number" step="1" placeholder="Quantity" class="w-full p-2 border-2 border-gray-200 rounded-lg text-sm outline-none">
        </div>

        <div class="mb-3 p-3 bg-slate-50 rounded-xl border border-slate-200">
            <h2 class="font-bold text-orange-600 uppercase text-[10px] mb-2 tracking-widest text-center">Posters</h2>
            <select id="posterSelect" onchange="togglePoster()" class="w-full p-2 border-2 border-gray-200 rounded-lg mb-2 text-sm outline-none"><option value="none">-- Select Size --</option></select>
            <div id="pStdBox"><input id="pQty" type="number" step="1" placeholder="Quantity" class="w-full p-2 border-2 border-gray-200 rounded-lg text-sm outline-none"></div>
            <div id="pCustBox" class="hidden grid grid-cols-2 gap-2">
                <input id="pH" type="number" step="any" placeholder="H (In)" class="p-2 border-2 border-gray-200 rounded-lg text-sm outline-none">
                <input id="pW" type="number" step="any" placeholder="W (In)" class="p-2 border-2 border-gray-200 rounded-lg text-sm outline-none">
            </div>
        </div>

        <div class="mb-4 p-3 bg-blue-50 rounded-xl border border-blue-200 grid grid-cols-2 gap-2">
            <div>
                <span class="text-[9px] font-bold text-gray-500 uppercase">Laminate?</span>
                <select id="lam" class="w-full p-1 rounded text-xs font-bold text-blue-800 border"><option value="no">NO</option><option value="yes">YES</option></select>
            </div>
            <div>
                <span class="text-[9px] font-bold text-gray-500 uppercase">Grommetts?</span>
                <select id="grom" class="w-full p-1 rounded text-xs font-bold text-blue-800 border"><option value="0">NONE</option><option value="1">1 SET</option><option value="2">2 SETS</option></select>
            </div>
        </div>

        <button onclick="calculate()" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl text-xl shadow-lg active:scale-95 transition">CALCULATE</button>
        <div id="resultBox" class="hidden mt-4 p-4 bg-green-100 border-2 border-green-500 rounded-xl text-center">
            <p id="total" class="text-4xl font-black text-green-900">$0.00</p>
            <button onclick="location.reload()" class="mt-2 text-[10px] text-green-700 underline font-bold uppercase">Reset</button>
        </div>
    </div>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRpd0v8hfAE_Ok5bjHS-OnuCjL6dJoaoXm2qGEOV47Ph2AGbZ7deEQd5ln0xfDONyAxIX7sIkr9saB5/pub?output=csv";
        let master = {};

        async function init() {
            try {
                const res = await fetch(SHEET_URL + "&cache=" + Date.now());
                const data = await res.text();
                data.split(/\r?\n/).slice(1).forEach(row => {
                    const cols = row.split(',');
                    if (cols.length < 3) return;
                    const cat = cols[0].trim().toLowerCase();
                    const name = cols[1].trim();
                    const price = parseFloat(cols[2]);
                    master[name] = { cat: cat, price: price };

                    let opt = document.createElement('option'); opt.value = name; opt.textContent = name;
                    if (cat === 'custom' && name.toLowerCase() !== 'laminate') document.getElementById('customSelect').appendChild(opt);
                    if (cat === 'standard' && !name.toLowerCase().includes('grommett')) document.getElementById('standardSelect').appendChild(opt);
                    if (cat === 'poster') {
                        opt.textContent = name.replace(/poster|size/gi, '').trim();
                        document.getElementById('posterSelect').appendChild(opt);
                    }
                });
                document.getElementById('status').innerText = "✅ Master List Synced";
                document.getElementById('status').className = "text-center text-[10px] font-bold py-1 mb-4 rounded bg-green-100 text-green-700";
            } catch (e) { document.getElementById('status').innerText = "❌ Sync Error"; }
        }

        function togglePoster() {
            const isCustom = document.getElementById('posterSelect').value.toLowerCase().includes('custom');
            document.getElementById('pCustBox').classList.toggle('hidden', !isCustom);
            document.getElementById('pStdBox').classList.toggle('hidden', isCustom);
        }

        function calculate() {
            const cType = document.getElementById('customSelect').value, cLen = parseFloat(document.getElementById('customLen').value);
            const sType = document.getElementById('standardSelect').value, sQty = parseFloat(document.getElementById('standardQty').value);
            const pType = document.getElementById('posterSelect').value, pQty = parseFloat(document.getElementById('pQty').value);
            const pH = parseFloat(document.getElementById('pH').value), pW = parseFloat(document.getElementById('pW').value);
            const useLam = document.getElementById('lam').value, gCount = document.getElementById('grom').value;
            
            let price = 0;
            const lamCost = master['Laminate']?.price || 0;

            if (cType !== "none" && !isNaN(cLen)) {
                price = (cLen * (master[cType].price + (useLam === 'yes' ? lamCost : 0))) * 3.5;
            } else if (sType !== "none" && !isNaN(sQty)) {
                price = sQty * master[sType].price;
                if (useLam === 'yes') price += (lamCost * sQty);
            } else if (pType !== "none") {
                if (pType.toLowerCase().includes('custom')) {
                    if (isNaN(pH) || isNaN(pW)) return alert("Enter H & W");
                    price = (pH * pW / 144) * master[pType].price;
                } else if (!isNaN(pQty)) { price = pQty * master[pType].price; }
            } else { return alert("Select an item!"); }

            if (gCount !== "0") {
                const gKey = `Grommett ${gCount} set${gCount === '2' ? 's' : ''}`;
                price += (master[gKey]?.price || 0);
            }
            document.getElementById('total').innerText = "$" + price.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('resultBox').classList.remove('hidden');
        }
        init();
    </script>
</body>
</html>
